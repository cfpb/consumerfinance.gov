# This is a basic workflow to help you get started with Actions

name: Veracode Policy Scan

# Controls when the action will run. Triggers the workflow on push or pull request
# events but only for the master branch
on:
  push:
    branches:
      - veracode
  pull_request:
    branches:
      - veracode

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  Build-and-Policy-scan:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4
      # - uses: actions/setup-java@v1 # Make java accessible on path so the uploadandscan action can run.
      #   with: 
      #     java-version: '8'
          
      # zip the project and move it to a staging directory
      - name: Zip Project
        run: zip -R cfgov-gha.zip '*.py' '*.js' '*.ts' '*.html' '*.htm' '*.lock' ${{ github.workspace }}/requirements
       
      - uses: actions/upload-artifact@v3 # Copy files from repository to docker container so the next uploadandscan action can access them.
        with:
          path: ./cfgov-gha.zip.zip # Wildcards can be used to filter the files copied into the container. See: https://github.com/actions/upload-artifact
      - uses: veracode/veracode-uploadandscan-action@master # Run the uploadandscan action. Inputs are described above.
        with:
          appname: cfgov
          filepath: 'cfgov-gha.zip'
          vid: '${{ secrets.VERACODE_API_ID }}'
          vkey: '${{ secrets.VERACODE_API_KEY }}'
          scantimeout: 15

      # Artifact the results for later use
      - name: Archive Results.json & Results.txt from Veracode Static Pipeline Scanner
        uses: actions/upload-artifact@v4.6.2
        with:
          # Artifact name
          name: Veracode SAST Pipeline Results
          path: results.*
