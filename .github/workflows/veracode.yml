name: veracode

# This workflow will checkout the code and scan with the Veracode Static Pipeline Scanner.
on:
  push:
    branches:
      - veracode
  pull_request:
    branches:
      - veracode

jobs:
  SAST_Scan:
    runs-on: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4.1.3

      - name: Setup Veracode
        run: |
         curl -fsS https://tools.veracode.com/veracode-cli/install | sh

      - name: Package App
        run: |
         ./veracode package -s . -a

      - name: SAST Scan
        continue-on-error: true
        env:
         VERACODE_API_KEY_ID: ${{ secrets.VERACODE_API_KEY_ID }}
         VERACODE_API_KEY_SECRET: ${{ secrets.VERACODE_API_KEY_SECRET }}
        run: |
         ./veracode static scan ./veracode-auto-pack-consumerfinance-python-no-pm.zip --summary-output sast-summary.txt
      
      - name: Upload SAST issues artifact
        uses: actions/upload-artifact@v4.3.3
        with:
           name: SAST-App-Issues-${{ github.run_id }}
           path: "*.json"
           
  SCA_Scan:
    runs-on: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4.1.3

      - name: SCA Scan
        env:
         SRCCLR_API_TOKEN: ${{ secrets.SRCCLR_API_TOKEN }}
        working-directory: ./consumerfinance.gov
        run: |
         curl -sSL https://download.sourceclear.com/ci.sh | sh -s scan --json=SCA-App-Issues.json

      - name: Upload SCA issues artifact
        uses: actions/upload-artifact@v4.3.3
        with:
           name: SCA-App-Issues-${{ github.run_id }}
           path: "SCA-App-Issues.json"
