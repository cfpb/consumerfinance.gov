approvedGitRepositories:
  - "https://github.com/cfpb/cfpb-britecharts.git"

defaultSemverRangePrefix: ""

enableGlobalCache: false

enableMirror: true

enableTelemetry: false

nodeLinker: node-modules

supportedArchitectures:
  cpu:
    - current
    - x64
    - arm64
  libc:
    - current
    - glibc
    - musl
  os:
    - current
    - darwin
    - linux
